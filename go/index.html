<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting… | Anju Redheendran</title>
<meta name="robots" content="noindex, nofollow">

<!-- Google Analytics (GA4) — same property as anjuredheendran.com -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RR6WWE2DCF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-RR6WWE2DCF');
</script>

<style>
  :root{
    --navy:#0a1628;
    --teal:#00c8b4;
    --gold:#c9a84c;
    --ink:#eef0ee;
    --ink-dim:#93a0ab;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--navy);
    color:var(--ink);
    font-family:'Montserrat',Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:2rem;
  }
  .wrap{max-width:420px;}
  .spinner{
    width:28px;height:28px;margin:0 auto 1.4rem;
    border:2.5px solid rgba(0,200,180,0.25);
    border-top-color:var(--teal);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  p{font-size:0.85rem;color:var(--ink-dim);line-height:1.7;}
  a{color:var(--teal);text-decoration:none;}
  a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="wrap">
  <div class="spinner" id="spinner"></div>
  <p id="msg">Taking you to Amazon…</p>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // AMAZON AFFILIATE REDIRECTS — /go/[slug]
  //
  // To add a new product: add one line below. No other files or
  // _redirects changes are needed — the /go/* rewrite in _redirects
  // already routes every /go/whatever URL to this page.
  //
  //   slug: { asin: 'AMAZON_ASIN', name: 'Product Name', type: 'category' }
  // ═══════════════════════════════════════════════════════════
  var ASSOCIATE_TAG = 'anjuredheendran-20';

  var AFFILIATE_LINKS = {
    book: {
      asin: 'B0DF5T4Q23',
      name: "I'll Have What SHE's Having!",
      type: 'book'
    }
    // Add future products here, e.g.:
    // journal: { asin: 'B0XXXXXXXX', name: 'Guided Journal', type: 'tool' }
  };

  function getSlug(){
    var path = window.location.pathname.replace(/\/+$/, ''); // strip trailing slash(es)
    var parts = path.split('/');
    return parts[parts.length - 1] || '';
  }

  function goTo(url){
    window.location.replace(url);
  }

  function handleRedirect(){
    var slug = getSlug();
    var entry = AFFILIATE_LINKS[slug];

    if (!entry) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').innerHTML =
        'We couldn\'t find that link. <a href="/">Go to homepage →</a>';
      return;
    }

    var destination = 'https://www.amazon.com/dp/' + entry.asin + '?tag=' + ASSOCIATE_TAG;
    var redirected = false;

    function redirectOnce(){
      if (redirected) return;
      redirected = true;
      goTo(destination);
    }

    // Hard fallback: if gtag.js is blocked/fails to load entirely, or
    // something else goes wrong, don't leave the visitor stranded.
    var hardFallback = setTimeout(redirectOnce, 1500);

    if (typeof gtag === 'function') {
      gtag('event', 'affiliate_link_click', {
        product_name: entry.name,
        product_type: entry.type,
        product_slug: slug,
        event_callback: function(){
          clearTimeout(hardFallback);
          redirectOnce();
        },
        event_timeout: 1000
      });
    }
  }

  handleRedirect();
</script>

</body>
</html>
